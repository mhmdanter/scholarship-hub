name: Scholarship Scraper Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Explicitly install core libraries in case requirements.txt is missed
          pip install beautifulsoup4 supabase python-dotenv playwright playwright-stealth
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Install Playwright Browsers
        run: |
          playwright install --with-deps chromium

      - name: Run Scraping Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python backend/main.py
